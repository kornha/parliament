name: Deploy iOS

on:
  push:
    branches: [ "main", "staging" ]
    paths:
      - 'lib/**'
      - 'ios/**'
      - '.github/workflows/ios.yaml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch config.env file from secret
        env:
          FLUTTER_DOT_ENV: ${{ secrets.FLUTTER_DOT_ENV }}
        run: echo "${FLUTTER_DOT_ENV}" > config.env

      - name: Download GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_IOS: ${{ secrets.GOOGLE_SERVICE_INFO_IOS }}
        run: echo "${GOOGLE_SERVICE_INFO_IOS}" > ios/Runner/GoogleService-Info.plist

      # Install the Apple certificate and provisioning profile.
      # We use different secrets depending on the branch:
      - name: Install cert & profile (with validation)
        env:
          BUILD_CERTIFICATE_BASE64: ${{ github.ref == 'refs/heads/main' && secrets.APPSTORE_CERT_BASE64 || secrets.APPSTORE_CERT_BASE64_STG }}
          P12_PASSWORD: ${{ secrets.APPSTORE_CERT_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ github.ref == 'refs/heads/main' && secrets.MOBILEPROVISION_BASE64 || secrets.MOBILEPROVISION_BASE64_STG }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_RAW="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # 1) Decode secrets -> files
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_RAW"

          # 2) Create + unlock temp keychain, make it default, keep login/system searchable
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          # Ensure login + System are on the list too (roots/intermediates)
          LOGIN_KC="login.keychain-db"
          if ! security list-keychain -d user | grep -q "$LOGIN_KC"; then LOGIN_KC="login.keychain"; fi
          security list-keychain -d user -s "$KEYCHAIN_PATH" "$LOGIN_KC" /Library/Keychains/System.keychain

          # 3) Import p12 (MUST contain private key)
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # 4) Allow codesign/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "== VALIDATE P12 LOOKS CORRECT =="
          if ! /usr/bin/openssl pkcs12 -in "$CERTIFICATE_PATH" -passin pass:"$P12_PASSWORD" -clcerts -nokeys >/dev/null 2>&1; then
            echo "::error:: The APPSTORE_CERT_BASE64 secret is not a valid .p12 (or the P12 password is wrong)."
            exit 1
          fi
          echo "P12 subject/issuer/dates:"
          /usr/bin/openssl pkcs12 -in "$CERTIFICATE_PATH" -passin pass:"$P12_PASSWORD" -clcerts -nokeys \
            | /usr/bin/openssl x509 -noout -subject -issuer -dates

          echo "== VALIDATE IMPORTED CODESIGN IDENTITIES =="
          ID_COUNT=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -E 'Apple (iPhone|Distribution):|Apple Distribution:' || true | wc -l | tr -d ' ')
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          if [ "$ID_COUNT" -eq 0 ]; then
            echo "::error:: No usable Apple Distribution identity with a PRIVATE KEY in $KEYCHAIN_PATH. Re-export a .p12 from Keychain (My Certificates) with the private key included."
            exit 1
          fi

          echo "== VALIDATE PROVISIONING PROFILE (TEAM/BUNDLE/METHOD) =="
          # Decode CMS -> plist (no temp file persisted)
          PP_PLIST_CONTENT="$(/usr/bin/security cms -D -i "$PP_RAW")"
          PP_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$PP_PLIST_CONTENT")
          PP_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin <<< "$PP_PLIST_CONTENT")
          PP_TEAM=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' /dev/stdin <<< "$PP_PLIST_CONTENT")
          PP_APPID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /dev/stdin <<< "$PP_PLIST_CONTENT") || true
          PP_TYPE=$(/usr/libexec/PlistBuddy -c 'Print :ProvisionsAllDevices' /dev/stdin <<< "$PP_PLIST_CONTENT" 2>/dev/null || echo "false")

          echo "Profile: $PP_NAME"
          echo "UUID:    $PP_UUID"
          echo "Team:    $PP_TEAM (expected: S8Y29AWZR2)"
          echo "AppID:   ${PP_APPID:-unknown}"
          echo "AllDevices(adhoc)? $PP_TYPE"

          if [ "$PP_TEAM" != "S8Y29AWZR2" ]; then
            echo "::error:: Provisioning profile TeamIdentifier ($PP_TEAM) does not match expected Team ID S8Y29AWZR2."
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_RAW" "$HOME/Library/MobileDevice/Provisioning Profiles/$PP_UUID.mobileprovision"

          echo "== SUMMARY =="
          echo "Keychain default: $(security default-keychain)"
          echo "Keychains: "
          security list-keychain -d user
          echo "Provisioning Profiles in place:"
          ls -l "$HOME/Library/MobileDevice/Provisioning Profiles" || true


      - name: Flutter get
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - run: flutter pub get

      # Use a different export options based on branch:
      - name: Build IPA
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            EXPORT_PLIST="ios/Runner/ExportOptions.plist"
          else
            EXPORT_PLIST="ios/Runner/ExportOptionsSTG.plist"
          fi
          flutter build ipa --export-options-plist=$EXPORT_PLIST

      # Upload the built IPA as an artifact for the deploy jobs to use:
      - name: Collect IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa

      # Cleanup: remove the temporary keychain and provisioning profile
      - name: Clean up keychain and provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision

  # Deploy job for staging (Firebase App Distribution)
  deploy_ios_firebase:
    name: Deploy to Firebase App Distribution (staging)
    if: github.ref == 'refs/heads/staging'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: release-ipa

      # 1) Authenticate with Google Cloud
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GH_SA_GOOGLE_CREDENTIALS }}'

      # 2) Install Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 363.0.0'

      # 3) Upload the IPA to GCS
      - name: Upload IPA to GCS
        run: |
          DATE=$(date +%Y-%m-%d)
          gsutil cp political_think.ipa gs://political-think.appspot.com/ios/parliament-$DATE.ipa

      # 4) Upload the IPA to Firebase App Distribution
      - name: Upload artifact to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          file: political_think.ipa

  # Deploy job for production (direct to Apple App Store Connect)
  deploy_ios_appstore:
    name: Deploy to App Store Connect (production)
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: release-ipa

      - name: Upload IPA to App Store Connect 
        run: | # APPLE_ID is email; APPLE_APP_SPECIFIC_PASSWORD go to appleid.apple.com, in Security section, App-Specific Passwords.
          echo "Uploading to App Store Connect..."
          xcrun altool --upload-app -f political_think.ipa -t ios -u "${{ secrets.APPLE_ID }}" -p "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" --verbose
